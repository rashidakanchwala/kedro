name: Snyk security and code quality scan

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Commit SHA to scan"
        required: true
        type: string
        default: fcb6b056bc39c8945c59b5d0dd4d90d16bd94425

  schedule:
    - cron: "0 0 * * *"

  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"

permissions:
  contents: read

jobs:
  snyk-oss:
    name: Snyk open-source dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[test]" || pip install -e .

      - name: Generate requirements.txt for Snyk
        run: pip freeze > requirements.txt

      - name: Run Snyk to check for dependency vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=requirements.txt --severity-threshold=high --sarif-file-output=snyk-oss.sarif

      - name: Upload OSS scan results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-oss.sarif') != ''
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

  snyk-code:
    name: Snyk code quality (SAST) scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha || github.sha }}

      - name: Run Snyk Code to check for code vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif

      - name: Upload Code scan results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
